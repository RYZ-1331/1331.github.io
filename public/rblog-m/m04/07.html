            <h3>04月07日(入学式)</h3>
            <p class="smallfont">普通にクラス離れると思ってたら見事一緒で草<br>
                助かったぜ<br>
                11組あったのである人が11組それぞれの<br>
                クラスになる確率が同様に確からしいとすると<br>
                ある2人の人が同じクラスになる確率は<br>
                1/11²なので1/121≒0.8%という凄そうだけど<br>
                そこまでみたいな確率っぽいですね(?)<br>
                あいつ早速友達作ってるというか作り置きというか<br>
                なんで入学前に友達できてるんだよ<br>
                意味わかんねえよ</p>
